name: Coolify Deployment Notification

on:
  push:
    branches:
      - main

jobs:
  notify-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment status to pending
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","description":"Deployment in progress","context":"Coolify Deploy"}'

      - name: Capture deployment start time
        run: |
          echo "DEPLOY_START_TIME=$(date -u '+%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV

      - name: Monitor Coolify Deployment
        id: monitor
        env:
          COOLIFY_AUTH_TOKEN: ${{ secrets.COOLIFY_AUTH_TOKEN }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_APP_ID: ${{ secrets.COOLIFY_APP_ID }}
        run: |
          result="failure"

          # Step 1 — wait for a deployment to appear (Coolify may take a few seconds)
          for i in $(seq 1 60); do
            resp=$(curl -s -H "Authorization: Bearer $COOLIFY_AUTH_TOKEN" \
              "$COOLIFY_BASE_URL/api/v1/deployments?appId=$COOLIFY_APP_ID&limit=1")
            if [ "$resp" != "[]" ] && [ -n "$resp" ]; then
              break
            fi
            sleep 15
          done

          # Step 2 — poll until the application reaches a terminal state
          for i in $(seq 1 40); do
            resp=$(curl -s -H "Authorization: Bearer $COOLIFY_AUTH_TOKEN" \
              "$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_ID")

            status=$(echo "$resp" | jq -r '.status // ""')
            updated=$(echo "$resp" | jq -r '.updated_at // ""')

            if [[ "$updated" > "$DEPLOY_START_TIME" ]]; then
              case "$status" in
                "running:healthy")
                  result="success"
                  break
                  ;;
                "running:unhealthy"|"error"|"failed"|"exited"*)
                  result="failure"
                  break
                  ;;
              esac
            fi
            sleep 20
          done

          echo "deployment_result=$result" >> $GITHUB_ENV

      - name: Update status — success
        if: env.deployment_result == 'success'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","description":"Deployment completed","context":"Coolify Deploy"}'

      - name: Update status — failure
        if: env.deployment_result == 'failure'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","description":"Deployment failed","context":"Coolify Deploy"}'

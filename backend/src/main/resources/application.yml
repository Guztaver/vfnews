server:
  port: ${PORT:8080}

spring:
  application:
    name: factchecker
  datasource:
    url: jdbc:sqlite:db.sqlite3
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

google:
  factcheck:
    api:
      key: ${GOOGLE_FACTCHECK_API_KEY:}
